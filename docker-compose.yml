# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Deploy Aria from GitHub Container Registry
#
# Quick start (NVIDIA / CUDA):
#   docker compose up -d
#
# AMD / ROCm:
#   docker compose --profile rocm up -d aria-rocm
#
# Prerequisites:
#   - Copy .env.example to .env and configure
#   - NVIDIA: install nvidia-container-toolkit
#   - ROCm:   install amdgpu driver + ROCm container toolkit
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── SearXNG — privacy-respecting metasearch engine ─────────────────────────
  # Required for web search when SEARXNG_URL is set in .env.
  # JSON output is enabled via searxng/settings.yml.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  # ── Byparr — headless browser proxy for search engines ─────────────────────
  # Optional. Set BYPARR_API_URL=http://byparr:8191 in .env to use.
  byparr:
    image: ghcr.io/byparr/byparr:latest
    container_name: byparr
    restart: unless-stopped

  # ── Aria (CUDA / CPU — local vLLM) ───────────────────────────────────────
  aria:
    image: ghcr.io/malvavisc0/aria-ai-cuda:latest
    container_name: aria
    ports:
      - "${SERVER_PORT:-9876}:9876"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      - searxng
      - byparr
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Aria Lite (no GPU — remote LLM or CPU-only) ─────────────────────────
  # Usage: docker compose up -d aria-lite
  aria-lite:
    image: ghcr.io/malvavisc0/aria-ai-lite:latest
    container_name: aria-lite
    ports:
      - "${SERVER_PORT:-9876}:9876"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      - searxng
      - byparr
    restart: unless-stopped

  # ── Aria ARM64 (Raspberry Pi 4 — remote LLM or CPU-only) ────────────────
  # Usage: docker compose up -d aria-arm64
  aria-arm64:
    image: ghcr.io/malvavisc0/aria-ai-arm64:latest
    container_name: aria-arm64
    ports:
      - "${SERVER_PORT:-9876}:9876"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      - searxng
      - byparr
    restart: unless-stopped

  # ── Aria ROCm (AMD GPUs) ──────────────────────────────────────────────────
  # Usage: docker compose --profile rocm up -d aria-rocm
  aria-rocm:
    image: ghcr.io/malvavisc0/aria-ai-rocm:latest
    container_name: aria-rocm
    profiles:
      - rocm
    ports:
      - "${SERVER_PORT:-9876}:9876"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      - searxng
      - byparr
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped
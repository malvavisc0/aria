# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Deploy Aria from GitHub Container Registry
#
# Quick start (NVIDIA / CUDA):
#   docker compose up -d
#
# AMD / ROCm:
#   docker compose --profile rocm up -d aria-rocm
#
# Prerequisites:
#   - Copy .env.example to .env and configure
#   - NVIDIA: install nvidia-container-toolkit
#   - ROCm:   install amdgpu driver + ROCm container toolkit
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Aria (CUDA / CPU) ─────────────────────────────────────────────────────
  aria:
    image: ghcr.io/malvavisc0/aria:latest
    container_name: aria
    ports:
      - "${SERVER_PORT:-9876}:9876"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Aria ROCm (AMD GPUs) ──────────────────────────────────────────────────
  # Usage: docker compose --profile rocm up -d aria-rocm
  aria-rocm:
    image: ghcr.io/malvavisc0/aria-rocm:latest
    container_name: aria-rocm
    profiles:
      - rocm
    ports:
      - "${SERVER_PORT:-9876}:9876"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped
name: Release

# Triggered when a version tag is pushed (e.g. v0.1.0)
# or manually via the GitHub Actions UI.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write # needed to create GitHub Releases and upload assets
  id-token: write # needed for PyPI trusted publishing (OIDC)
  packages: write # needed to push Docker images to GHCR

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 0: Validate that the tag matches __version__ in __init__.py
  # ────────────────────────────────────────────────────────────────────────────
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and compare versions
        run: |
          # Derive the tag (supports both push and workflow_dispatch)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          # Strip leading 'v' prefix
          TAG_VERSION="${TAG#v}"

          # Read __version__ from src/aria/__init__.py
          INIT_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('src/aria/__init__.py').read_text()
          match = re.search(r'^__version__\s*=\s*[\"]([^\"]+)[\"]', text, re.MULTILINE)
          print(match.group(1) if match else '')
          ")

          if [[ -z "${INIT_VERSION}" ]]; then
            echo "::error::Could not read __version__ from src/aria/__init__.py"
            exit 1
          fi

          echo "Tag version:     ${TAG_VERSION}"
          echo "__init__ version: ${INIT_VERSION}"

          if [[ "${TAG_VERSION}" != "${INIT_VERSION}" ]]; then
            echo "::error::Version mismatch! Tag '${TAG_VERSION}' != __version__ '${INIT_VERSION}'. Update src/aria/__init__.py before tagging."
            exit 1
          fi

          echo "✅ Versions match: ${TAG_VERSION}"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build the Linux AppImage
  # ────────────────────────────────────────────────────────────────────────────
  build-appimage:
    name: Build AppImage (Linux x86_64)
    needs: validate-version
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            imagemagick \
            fuse \
            file

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Build AppDir structure
        run: |
          APPDIR="${GITHUB_WORKSPACE}/dist/Aria.AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          # Copy PyInstaller one-folder bundle
          cp -r dist/aria-gui/. "${APPDIR}/usr/bin/"

          # AppRun entry point
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="${HERE}/usr/bin/PySide6/Qt/plugins"
          export QML2_IMPORT_PATH="${HERE}/usr/bin/PySide6/Qt/qml"
          exec "${HERE}/usr/bin/aria-gui" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Desktop entry
          cat > "${APPDIR}/aria-gui.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Aria
          Comment=AI Assistant with web UI and local LLM support
          Exec=aria-gui
          Icon=aria-gui
          Type=Application
          Categories=Utility;Science;
          Terminal=false
          DESKTOP
          cp "${APPDIR}/aria-gui.desktop" \
             "${APPDIR}/usr/share/applications/aria-gui.desktop"

          # Icon
          convert public/favicon.png -resize 256x256 \
            "${APPDIR}/usr/share/icons/hicolor/256x256/apps/aria-gui.png"
          cp "${APPDIR}/usr/share/icons/hicolor/256x256/apps/aria-gui.png" \
             "${APPDIR}/aria-gui.png"

      - name: Download appimagetool
        run: |
          curl -fsSL -o dist/appimagetool-x86_64.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x dist/appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 dist/appimagetool-x86_64.AppImage \
            dist/Aria.AppDir \
            dist/Aria-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-x86_64.AppImage
          path: dist/Aria-x86_64.AppImage
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build the Windows .exe
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    needs: validate-version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Zip the output folder
        run: |
          Compress-Archive -Path dist\aria-gui\* -DestinationPath dist\Aria-Windows-x86_64.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-Windows-x86_64.zip
          path: dist/Aria-Windows-x86_64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Build the macOS .app bundle (Apple Silicon)
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS .app (arm64)
    needs: validate-version
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Rename bundle to Aria.app
        run: |
          mv dist/aria-gui dist/Aria.app

      - name: Create zip for distribution
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Aria.app Aria-macOS-arm64.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-macOS-arm64.zip
          path: dist/Aria-macOS-arm64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Publish to PyPI using trusted publishing (OIDC)
  # ────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: validate-version
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aria

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Build and push Docker images to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: "Build Docker (${{ matrix.label }})"
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "CUDA/CPU"
            base_image: "vllm/vllm-openai:latest"
            suffix: ""
          - label: "ROCm (AMD)"
            base_image: "vllm/vllm-openai-rocm:latest"
            suffix: "-rocm"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aria${{ matrix.suffix }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/aria${{ matrix.suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 6: Create GitHub Release and attach all platform artifacts
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      [build-appimage, build-windows, build-macos, publish-pypi, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-x86_64.AppImage
          path: release-assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-Windows-x86_64.zip
          path: release-assets/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-macOS-arm64.zip
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aria ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/Aria-x86_64.AppImage
            release-assets/Aria-Windows-x86_64.zip
            release-assets/Aria-macOS-arm64.zip
          body: |
            ## Aria ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux (x86_64) | `Aria-x86_64.AppImage` |
            | Windows (x86_64) | `Aria-Windows-x86_64.zip` |
            | macOS (Apple Silicon) | `Aria-macOS-arm64.zip` |

            ### pip

            ```bash
            pip install aria==${{ steps.version.outputs.version }}
            ```

            ### Linux — AppImage

            ```bash
            chmod +x Aria-x86_64.AppImage
            ./Aria-x86_64.AppImage
            ```

            ### Windows

            Extract `Aria-Windows-x86_64.zip` and run `aria-gui.exe`.

            ### macOS

            Extract `Aria-macOS-arm64.zip`, then:
            ```bash
            xattr -cr Aria.app
            open Aria.app
            ```

            ### Docker

            ```bash
            # CUDA / CPU
            docker run -p 9876:9876 -v ./data:/app/data ghcr.io/malvavisc0/aria:latest

            # ROCm (AMD GPUs)
            docker run -p 9876:9876 -v ./data:/app/data ghcr.io/malvavisc0/aria-rocm:latest
            ```

            ### First Run

            On first launch, Aria creates a `.env` file in the current directory
            with default configuration. Edit it to set your LLM API URLs and ports.

name: Release

# Triggered when a version tag is pushed (e.g. v0.1.0)
# or manually via the GitHub Actions UI.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write # needed to create GitHub Releases and upload assets
  id-token: write # needed for PyPI trusted publishing (OIDC)
  packages: write # needed to push Docker images to GHCR

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 0: Validate that the tag matches __version__ in __init__.py
  # ────────────────────────────────────────────────────────────────────────────
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and compare versions
        run: |
          # Derive the tag (supports both push and workflow_dispatch)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          # Strip leading 'v' prefix
          TAG_VERSION="${TAG#v}"

          # Read __version__ from src/aria/__init__.py
          INIT_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('src/aria/__init__.py').read_text()
          match = re.search(r'^__version__\s*=\s*[\"]([^\"]+)[\"]', text, re.MULTILINE)
          print(match.group(1) if match else '')
          ")

          if [[ -z "${INIT_VERSION}" ]]; then
            echo "::error::Could not read __version__ from src/aria/__init__.py"
            exit 1
          fi

          echo "Tag version:     ${TAG_VERSION}"
          echo "__init__ version: ${INIT_VERSION}"

          if [[ "${TAG_VERSION}" != "${INIT_VERSION}" ]]; then
            echo "::error::Version mismatch! Tag '${TAG_VERSION}' != __version__ '${INIT_VERSION}'. Update src/aria/__init__.py before tagging."
            exit 1
          fi

          echo "✅ Versions match: ${TAG_VERSION}"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build the Windows .exe
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    needs: validate-version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Zip the output folder
        run: |
          Compress-Archive -Path dist\aria-gui\* -DestinationPath dist\Aria-Windows-x86_64.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-Windows-x86_64.zip
          path: dist/Aria-Windows-x86_64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build the macOS .app bundle (Apple Silicon)
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS .app (arm64)
    needs: validate-version
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Rename bundle to Aria.app
        run: |
          mv dist/aria-gui dist/Aria.app

      - name: Create zip for distribution
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Aria.app Aria-macOS-arm64.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-macOS-arm64.zip
          path: dist/Aria-macOS-arm64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Publish to PyPI using trusted publishing (OIDC)
  # ────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: validate-version
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aria-ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Build and push Docker images to GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: "Build Docker (${{ matrix.label }})"
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "CUDA/CPU"
            base_image: "vllm/vllm-openai:latest"
            suffix: "-cuda"
            dockerfile: "Dockerfile"
          - label: "ROCm (AMD)"
            base_image: "vllm/vllm-openai-rocm:latest"
            suffix: "-rocm"
            dockerfile: "Dockerfile"
          - label: "Debian (lite)"
            base_image: ""
            suffix: "-lite"
            dockerfile: "Dockerfile.debian"
          - label: "ARM64 (Linux)"
            base_image: ""
            suffix: "-arm64"
            dockerfile: "Dockerfile.debian"
            platform: "linux/arm64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform || 'linux/amd64' }}
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aria-ai${{ matrix.suffix }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/aria-ai${{ matrix.suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5: Create GitHub Release and attach all platform artifacts
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, publish-pypi, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-Windows-x86_64.zip
          path: release-assets/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-macOS-arm64.zip
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aria ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/Aria-Windows-x86_64.zip
            release-assets/Aria-macOS-arm64.zip
          body: |
            ## Aria ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (x86_64) | `Aria-Windows-x86_64.zip` |
            | macOS (Apple Silicon) | `Aria-macOS-arm64.zip` |

            ### pip

            ```bash
            pip install aria-ai==${{ steps.version.outputs.version }}
            ```

            ### Windows

            Extract `Aria-Windows-x86_64.zip` and run `aria-gui.exe`.

            ### macOS

            Extract `Aria-macOS-arm64.zip`, then:
            ```bash
            xattr -cr Aria.app
            open Aria.app
            ```

            ### Docker

            ```bash
            # CUDA / CPU (local vLLM)
            docker run -p 9876:9876 \
              -v ./data:/app/data \
              --env-file .env \
              ghcr.io/malvavisc0/aria-ai-cuda:latest

            # ROCm (AMD GPUs)
            docker run -p 9876:9876 \
              -v ./data:/app/data \
              --env-file .env \
              ghcr.io/malvavisc0/aria-ai-rocm:latest

            # Lightweight — no GPU (remote LLM or CPU-only)
            docker run -p 9876:9876 \
              -v ./data:/app/data \
              --env-file .env \
              ghcr.io/malvavisc0/aria-ai-lite:latest

            # ARM64 — Raspberry Pi 4 (remote LLM or CPU-only)
            docker run -p 9876:9876 \
              -v ./data:/app/data \
              --env-file .env \
              ghcr.io/malvavisc0/aria-ai-arm64:latest
            ```

            ### First Run

            On first launch, Aria creates a `.env` file in the current directory
            with default configuration. Edit it to set your LLM API URLs and ports.

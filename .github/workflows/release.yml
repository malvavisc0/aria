name: Release

# Triggered when a version tag is pushed (e.g. v0.1.0)
# or manually via the GitHub Actions UI.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build the Linux AppImage
  # ────────────────────────────────────────────────────────────────────────────
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            imagemagick \
            fuse \
            file

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Build AppDir structure
        run: |
          APPDIR="${GITHUB_WORKSPACE}/dist/Aria.AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          # Copy PyInstaller one-folder bundle
          cp -r dist/aria-gui/. "${APPDIR}/usr/bin/"

          # AppRun entry point
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="${HERE}/usr/bin/PySide6/Qt/plugins"
          export QML2_IMPORT_PATH="${HERE}/usr/bin/PySide6/Qt/qml"
          exec "${HERE}/usr/bin/aria-gui" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Desktop entry
          cat > "${APPDIR}/aria-gui.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Aria
          Comment=AI Assistant with web UI and local LLM support
          Exec=aria-gui
          Icon=aria-gui
          Type=Application
          Categories=Utility;Science;
          Terminal=false
          DESKTOP
          cp "${APPDIR}/aria-gui.desktop" \
             "${APPDIR}/usr/share/applications/aria-gui.desktop"

          # Icon
          convert public/favicon.png -resize 256x256 \
            "${APPDIR}/usr/share/icons/hicolor/256x256/apps/aria-gui.png"
          cp "${APPDIR}/usr/share/icons/hicolor/256x256/apps/aria-gui.png" \
             "${APPDIR}/aria-gui.png"

      - name: Download appimagetool
        run: |
          curl -fsSL -o dist/appimagetool-x86_64.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x dist/appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 dist/appimagetool-x86_64.AppImage \
            dist/Aria.AppDir \
            dist/Aria-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-x86_64.AppImage
          path: dist/Aria-x86_64.AppImage
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build the Windows .exe installer
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (gui + dev)
        run: uv sync --extra gui --group dev

      - name: Run PyInstaller
        run: uv run pyinstaller packaging/aria-gui.spec --noconfirm

      - name: Zip the output folder
        # Zip the one-folder bundle so it can be uploaded as a single artifact.
        # For a proper installer, replace this step with Inno Setup or NSIS.
        run: |
          Compress-Archive -Path dist\aria-gui\* -DestinationPath dist\Aria-Windows-x86_64.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aria-Windows-x86_64.zip
          path: dist/Aria-Windows-x86_64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release and attach both artifacts
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-appimage, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-x86_64.AppImage
          path: release-assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Aria-Windows-x86_64.zip
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aria ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/Aria-x86_64.AppImage
            release-assets/Aria-Windows-x86_64.zip
          body: |
            ## Aria ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux (x86_64) | `Aria-x86_64.AppImage` |
            | Windows (x86_64) | `Aria-Windows-x86_64.zip` |

            ### Linux — AppImage

            ```bash
            chmod +x Aria-x86_64.AppImage
            ./Aria-x86_64.AppImage
            ```

            ### Windows

            Extract `Aria-Windows-x86_64.zip` and run `aria-gui.exe`.

            ### First Run

            On first launch, Aria creates a `.env` file in the current directory
            with default configuration. Edit it to set your LLM API URLs and ports.
